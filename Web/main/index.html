<script>

function updateTime(){

const now = new Date()

let h = now.getHours().toString().padStart(2,'0')
let m = now.getMinutes().toString().padStart(2,'0')

document.getElementById("timeButton").innerText = h + ":" + m

}

updateTime()

setInterval(updateTime,1000)

</script>
