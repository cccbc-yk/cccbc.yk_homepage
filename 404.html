<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - CCCBC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .error-container {
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #0077ff;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 119, 255, 0.4);
            font-family: "Hind", sans-serif;
        }

        .error-message {
            font-size: 24px;
            color: #003366;
            margin: 20px 0;
            font-weight: 700;
        }

        .error-description {
            font-size: 16px;
            color: #004488;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .home-button {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(180deg, #00d2ff, #0077ff);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 119, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .home-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 119, 255, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>
    <div class="side-frame side-frame-left"></div>
    <div class="side-frame side-frame-right"></div>
    <div class="error-container">
        <h1 class="error-code">404 Not found</h1>
        <p class="error-message">工事中</p>
        <p class="error-description">
            お探しのページは、削除されたか、名前が変更されたか、<br>
            一時的に利用できない可能性があります。
        </p>
        <a href="index.html" class="home-button">ホームに戻る</a>
    </div>

    <section class="footer"></section>

    <script src="assets/js/header_manager.js"></script>
    <script src="assets/js/footer.js"></script>



    <script>


    </script>
</body>

</html>
