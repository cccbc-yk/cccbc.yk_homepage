<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同好会掲示板 - CCCBC</title>
    <!-- Apply Settings Script -->
    <script src="../assets/js/apply_settings.js"></script>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Three.js for 3D Logo -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/bbs.css">
</head>

<body>
    <div class="side-frame side-frame-left"></div>
    <div class="side-frame side-frame-right"></div>
    <div id="header-earth-part"></div>
    <div id="header-container">
        <div id="canvas-wrap">
            <div id="header-bg-part"></div>

            <canvas id="headerCanvas"></canvas>
            <div id="box-time" class="info-box">
                <span class="label">Time</span>
                <span id="currentTime" class="value">00:00:00</span>
            </div>

            <div id="box-network" class="info-box">
                <span class="label">Network</span>
                <div id="antenna-container">
                    <svg width="40" height="26" viewBox="0 0 50 30">
                        <path d="M 8 28 V 10 M 8 10 L 4 5 H 12 Z" stroke="white" stroke-width="2" fill="none" />
                        <rect class="sig-bar active" x="18" y="22" width="4" height="6" rx="1" />
                        <rect class="sig-bar active" x="26" y="15" width="4" height="13" rx="1" />
                        <rect class="sig-bar active" x="34" y="9" width="4" height="19" rx="1" />
                        <rect class="sig-bar active" id="bar-4" x="42" y="3" width="4" height="25" rx="1" />
                    </svg>
                </div>
            </div>

            <div id="box-access" class="info-box">
                <span class="label">Access</span>
                <span id="accessCount" class="value">10,841</span>
            </div>
        </div>
    </div>

    <div class="menu-panel" id="menuPanel">
        <a href="../index.html">ホーム</a>
        <a href="../index.html#about">同好会紹介</a>
        <a href="./members.html">部員紹介</a>
        <a href="./works.html">部員作品一覧</a>
        <a href="./activities.html">活動実績</a>
        <a href="../index.html#release-notes">リリースノート</a>
        <a href="./recruitment.html">募集要項</a>
        <a href="./bbs.html">同好会掲示板</a>
        <a href="./inquiry.html">お問い合わせ</a>
        <a href="./settings.html">サイト設定</a>
    </div>

    <main>
        <div class="bbs-wrapper aero-content-box">
            <h1 class="bbs-title">みんなで作ろう。</h1>
            <p class="bbs-subtitle">コンピュータ同好会 公式掲示板</p>

            <div class="bbs-actions">
                <button class="bbs-btn primary-btn">+ 新規投稿</button>
                <div class="bbs-search">
                    <input type="text" id="searchInput" placeholder="キーワード検索...">
                    <button id="searchBtn" class="bbs-btn icon-btn">🔍</button>
                </div>
            </div>

            <div class="bbs-list">
                <!-- Javascript will load posts here -->
            </div>

            <div class="bbs-pagination">
                <!-- Javascript will load pagination here -->
            </div>
        </div>

        <section class="footer">
            <div style="margin-top: 50px;">
                <p style="color: aliceblue;">Copyright© cccbc.yk 2026
                    <br>
                    Powered by Github Pages
                    <br>
                </p>
            </div>
        </section>
    </main>

    <!-- 新規投稿モーダル -->
    <div id="postModal" class="bbs-modal">
        <div class="bbs-modal-content aero-content-box">
            <span class="close-modal">&times;</span>
            <h2 class="bbs-modal-title">新規投稿</h2>
            <form id="postForm">
                <div class="form-group">
                    <label>タグ:</label>
                    <select id="postTag" required>
                        <option value="important">重要</option>
                        <option value="idea">アイデア</option>
                        <option value="question">質問</option>
                        <option value="report">進捗報告</option>
                        <option value="chat">雑談</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>タイトル:</label>
                    <input type="text" id="postTitle" required placeholder="タイトルを入力">
                </div>
                <div class="form-group">
                    <label>お名前:</label>
                    <input type="text" id="postAuthor" required placeholder="名前または役職">
                </div>
                <div class="form-group">
                    <label>内容:</label>
                    <textarea id="postContent" required rows="5" placeholder="投稿内容を入力してください"></textarea>
                </div>
                <div class="form-group">
                    <label>削除用パスワード (任意):</label>
                    <input type="password" id="postPassword" placeholder="投稿を削除する際に使用します">
                </div>
                <button type="submit" class="bbs-btn primary-btn submit-btn">投稿する</button>
            </form>
        </div>
    </div>

    <!-- ページトップボタン -->
    <button id="pageTop"
        style="position: fixed; bottom: 30px; right: calc(max((100vw - 1500px) / 2, 0px) + 20px);">PageTop</button>

    <script type="module">
        // 本物のアクセス数を取得して更新
        async function updateRealAccessCount() {
            const el = document.getElementById('accessCount');
            const siteId = "cccbc-yk-homepage"; // サイト識別用ID

            try {
                const response = await fetch(`https://api.visitorbadge.io/api/visitors?path=${siteId}&countOnly=true`);
                const text = await response.text();
                const match = text.match(/VISITORS:\s*([\d,]+)/i) || text.match(/<text.*?font-weight="bold".*?>([\d,]+)<\/text>/i);
                const count = match ? parseInt(match[1].replace(/,/g, '')) : 0;
                const baseCount = 0;
                el.textContent = (baseCount + count).toLocaleString();
            } catch (e) {
                console.error("Access count fetch failed:", e);
            }
        }

        // 時刻・ステータスの更新
        function updateStats() {
            const now = new Date();
            const elTime = document.getElementById('currentTime');
            if (elTime) {
                elTime.textContent =
                    now.getHours().toString().padStart(2, '0') + ':' +
                    now.getMinutes().toString().padStart(2, '0') + ':' +
                    now.getSeconds().toString().padStart(2, '0');
            }

            // アンテナの演出: 基本4本、たまに3本
            const bar4 = document.getElementById('bar-4');
            if (bar4 && Math.random() > 0.95) {
                bar4.style.opacity = Math.random() > 0.3 ? "1" : "0.2";
            }
        }

        setInterval(updateStats, 1000);
        updateStats();
        updateRealAccessCount();

        // Canvas要素が未使用の場合は非表示にする
        const headerCanvas = document.getElementById('headerCanvas');
        if (headerCanvas) headerCanvas.style.display = 'none';

        // 地球メニューの開閉
        const earthBtn = document.getElementById('header-earth-part');
        const menuPanel = document.getElementById('menuPanel');

        if (earthBtn && menuPanel) {
            earthBtn.addEventListener('click', () => {
                menuPanel.classList.toggle('open');
                earthBtn.classList.toggle('active');
            });
        }

        document.addEventListener('click', async (e) => {
            const link = e.target.closest('a');
            if (!link) return;

            const href = link.getAttribute('href');
            if (href === '#' || !href) {
                e.preventDefault();
                return;
            }
        });

        document.addEventListener('click', (e) => {
            if (earthBtn && !earthBtn.contains(e.target) && menuPanel && !menuPanel.contains(e.target)) {
                menuPanel.classList.remove('open');
                earthBtn.classList.remove('active');
            }
        });

        const pageTop = document.getElementById("pageTop");
        if (pageTop) {
            pageTop.onclick = () => {
                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });
            };
        }

        // --- 新規投稿機能 ---
        const postModal = document.getElementById('postModal');
        const openModalBtn = document.querySelector('.bbs-btn.primary-btn');
        const closeModalBtn = document.querySelector('.close-modal');
        const postForm = document.getElementById('postForm');
        const bbsList = document.querySelector('.bbs-list');

        if (openModalBtn && postModal) {
            openModalBtn.addEventListener('click', () => {
                postModal.classList.add('show');
            });
        }

        if (closeModalBtn && postModal) {
            closeModalBtn.addEventListener('click', () => {
                postModal.classList.remove('show');
            });
        }

        window.addEventListener('click', (e) => {
            if (e.target === postModal) {
                postModal.classList.remove('show');
            }
        });

        const escapeHTML = (str) => {
            if (!str) return '';
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        };

        // ==========================================
        // Firebase 連携とページネーション
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // ▼ユーザー設定: Firebaseコンソールのプロジェクト情報に書き換えてください▼
        const firebaseConfig = {
            apiKey: "AIzaSyDrSlOu08CDXbMBGRYRKPTBOMQIn6HQ8LI",
            authDomain: "cccbc-yk.firebaseapp.com",
            projectId: "cccbc-yk",
            storageBucket: "cccbc-yk.firebasestorage.app",
            messagingSenderId: "230911510682",
            appId: "1:230911510682:web:ad3b21c500ddb47e5ab723",
            measurementId: "G-4V85ZFR53W"
        };
        // ▲ここまで▲

        let db = null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase initialization failed:", e);
        }

        const ITEMS_PER_PAGE = 5;
        let currentPage = 1;
        let allPostsFirebase = [];
        let currentSearchKeyword = '';

        const loadPosts = (filterKeyword = '') => {
            currentSearchKeyword = filterKeyword.toLowerCase();
            if (!bbsList) return;

            // フィルタリング
            const filteredPosts = currentSearchKeyword
                ? allPostsFirebase.filter(p => (p.title && p.title.toLowerCase().includes(currentSearchKeyword)) || (p.content && p.content.toLowerCase().includes(currentSearchKeyword)))
                : allPostsFirebase;

            const totalPages = Math.ceil(filteredPosts.length / ITEMS_PER_PAGE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const displayPosts = filteredPosts.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            bbsList.innerHTML = '';

            if (filteredPosts.length === 0) {
                // 初回読み込み前・データなしの場合
                if (db && firebaseConfig.apiKey !== "YOUR_API_KEY") {
                    bbsList.innerHTML = '<p style="text-align:center; padding: 20px;">投稿がありません。</p>';
                } else if (!db || firebaseConfig.apiKey === "YOUR_API_KEY") {
                    bbsList.innerHTML = '<p style="text-align:center; padding: 20px; color: #ffcccc;">※Firebaseの初期設定が完了していません。bbs.html の firebaseConfig を書き換えてください。</p>';
                }
                renderPagination(0);
                return;
            }

            displayPosts.forEach(post => {
                const card = document.createElement('div');
                card.className = post.tag === 'important' ? 'bbs-card dynamic-post pin' : 'bbs-card dynamic-post';

                let tagText = 'お知らせ';
                if (post.tag === 'important') tagText = '重要';
                else if (post.tag === 'idea') tagText = 'アイデア';
                else if (post.tag === 'question') tagText = '質問';
                else if (post.tag === 'report') tagText = '進捗報告';
                else if (post.tag === 'chat') tagText = '雑談';

                const iconClasses = ['admin', 'member-1', 'member-2', 'member-3'];
                const randomIcon = iconClasses[Math.abs((post.author || '').length) % iconClasses.length] || 'member-1';

                const commentsCount = post.comments ? post.comments.length : 0;

                // コメントHTML生成
                let commentsHTML = '';
                if (post.comments && post.comments.length > 0) {
                    commentsHTML = post.comments.map(c => `
                        <div class="bbs-comment-item">
                            <div class="comment-header">
                                <span class="comment-author">${escapeHTML(c.author || '')}</span>
                                <span class="comment-date">${c.date || ''}</span>
                            </div>
                            <div class="comment-body">${escapeHTML(c.content || '').replace(/\n/g, '<br>')}</div>
                        </div>
                    `).join('');
                } else {
                    commentsHTML = '<p class="no-comments">コメントはまだありません。</p>';
                }

                card.innerHTML = `
                    <div class="bbs-card-header">
                        <span class="bbs-tag ${post.tag}">${tagText}</span>
                        <span class="bbs-date">${post.date}</span>
                    </div>
                    <h2 class="bbs-post-title">${escapeHTML(post.title)}</h2>
                    <p class="bbs-post-excerpt">${escapeHTML(post.content).replace(/\n/g, '<br>')}</p>
                    <div class="bbs-card-footer">
                        <div class="bbs-author">
                            <div class="author-icon ${randomIcon}"></div>
                            <span>${escapeHTML(post.author)}</span>
                        </div>
                        <div class="bbs-stats">
                            <span class="stat comment-btn" data-id="${post.id}" style="cursor: pointer;" title="コメントを表示する">💬 ${commentsCount}</span>
                            <span class="stat delete-btn" data-id="${post.id}" style="cursor: pointer; opacity: 0.8;" title="この投稿を削除する">🗑️</span>
                            <span class="stat">👀 <span style="font-size:0.8em;">--</span></span>
                        </div>
                    </div>
                    
                    <!-- コメントセクション -->
                    <div class="bbs-comments-section" id="comments-${post.id}" style="display: none;">
                        <div class="bbs-comment-list">
                            ${commentsHTML}
                        </div>
                        <form class="bbs-comment-form" onsubmit="submitComment(event, '${post.id}')">
                            <input type="text" class="comment-name-input" placeholder="名前" required maxlength="20">
                            <input type="text" class="comment-text-input" placeholder="コメントを入力..." required maxlength="200">
                            <button type="submit" class="bbs-btn primary-btn small-btn">送信</button>
                        </form>
                    </div>
                `;

                card.addEventListener('click', (e) => {
                    if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.bbs-comments-section') || e.target.closest('.comment-btn') || e.target.closest('.delete-btn')) {
                        return;
                    }
                    card.classList.toggle('expanded');
                    const commentsSec = document.getElementById(`comments-${post.id}`);
                    if (card.classList.contains('expanded')) {
                        commentsSec.style.display = 'block';
                    } else {
                        commentsSec.style.display = 'none';
                    }
                });

                bbsList.appendChild(card);
            });

            renderPagination(totalPages);
            setupCommentToggles();
            setupDeleteButtons();
        };

        const renderPagination = (totalPages) => {
            const paginationContainer = document.querySelector('.bbs-pagination');
            if (!paginationContainer) return;

            paginationContainer.innerHTML = '';

            if (totalPages <= 1) return;

            const makeBtn = (pageNum, text) => {
                const btn = document.createElement('button');
                btn.className = 'page-btn' + (pageNum === currentPage ? ' active' : '');
                btn.textContent = text || pageNum;
                btn.onclick = () => {
                    currentPage = pageNum;
                    loadPosts(searchInput ? searchInput.value : '');
                    window.scrollTo({ top: 0, behavior: "smooth" });
                };
                return btn;
            };

            const makeDots = () => {
                const span = document.createElement('span');
                span.className = 'page-dots';
                span.textContent = '...';
                return span;
            };

            paginationContainer.appendChild(makeBtn(1));

            let startPage = Math.max(2, currentPage - 2);
            let endPage = Math.min(totalPages - 1, currentPage + 2);

            if (startPage > 2) paginationContainer.appendChild(makeDots());

            for (let i = startPage; i <= endPage; i++) {
                paginationContainer.appendChild(makeBtn(i));
            }

            if (endPage < totalPages - 1) paginationContainer.appendChild(makeDots());

            if (totalPages > 1) {
                paginationContainer.appendChild(makeBtn(totalPages));
            }
        };

        const setupCommentToggles = () => {
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const postId = btn.getAttribute('data-id');
                    const commentsSec = document.getElementById(`comments-${postId}`);
                    const card = btn.closest('.bbs-card');
                    if (commentsSec.style.display === 'none') {
                        commentsSec.style.display = 'block';
                        if (card) card.classList.add('expanded');
                    } else {
                        commentsSec.style.display = 'none';
                        if (card) card.classList.remove('expanded');
                    }
                });
            });
        };

        const setupDeleteButtons = () => {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const postId = btn.getAttribute('data-id');
                    const post = allPostsFirebase.find(p => p.id === postId);
                    if (!post) return;

                    const userInput = prompt("この投稿を削除するためのパスワードを入力してください:\n");
                    if (userInput === null) return;

                    if (post.deletePassword && post.deletePassword === userInput) {
                        if (confirm("本当にこの投稿と関連するコメントをすべて削除しますか？")) {
                            await deletePostDoc(postId);
                        }
                    } else if (userInput === "admin") {
                        if (confirm("管理者権限で削除しますか？")) {
                            await deletePostDoc(postId);
                        }
                    } else {
                        alert("パスワードが違います。");
                    }
                });
            });
        };

        const deletePostDoc = async (postId) => {
            try {
                await deleteDoc(doc(db, "bbs_posts", postId));
                alert("投稿を削除しました。");
            } catch (error) {
                console.error("削除エラー: ", error);
                alert("データの削除に失敗しました。通信環境やセキュリティ設定をご確認ください。");
            }
        };

        // Firebase リアルタイムデータ取得のセットアップ
        if (db && firebaseConfig.apiKey !== "YOUR_API_KEY") {
            const postsCollection = collection(db, "bbs_posts");
            const postsQuery = query(postsCollection, orderBy("createdAt", "desc"));

            onSnapshot(postsQuery, (snapshot) => {
                allPostsFirebase = [];
                snapshot.forEach((docSnap) => {
                    allPostsFirebase.push({ id: docSnap.id, ...docSnap.data() });
                });
                loadPosts(searchInput ? searchInput.value : '');
            }, (error) => {
                console.error("Firebase listen error:", error);
                if (bbsList) {
                    bbsList.innerHTML = `<p style="text-align:center; padding: 20px; color: #ffcccc;">データの読み込みに失敗しました。</p>`;
                }
            });
        } else {
            // 初期状態、設定未完了メッセージを表示
            loadPosts('');
        }

        // コメント送信処理 (HTMLからの呼び出し用にwindowに用意)
        window.submitComment = async (e, postId) => {
            e.preventDefault();
            if (!db || firebaseConfig.apiKey === "YOUR_API_KEY") {
                alert("Firebaseの設定が完了していません。投稿機能は無効になっています。");
                return;
            }

            const form = e.target;
            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = "送信中...";

            const author = form.querySelector('.comment-name-input').value;
            const content = form.querySelector('.comment-text-input').value;

            const now = new Date();
            const dateStr =
                now.getFullYear() + '/' +
                String(now.getMonth() + 1).padStart(2, '0') + '/' +
                String(now.getDate()).padStart(2, '0') + ' ' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');

            const postRef = doc(db, "bbs_posts", postId);

            try {
                await updateDoc(postRef, {
                    comments: arrayUnion({
                        id: Date.now().toString(),
                        author,
                        content,
                        date: dateStr,
                        createdAt: Date.now()
                    })
                });
                form.reset();
            } catch (error) {
                console.error("Error adding comment: ", error);
                alert("コメントの送信に失敗しました。(セキュリティルールの設定等をご確認ください)");
            } finally {
                btn.disabled = false;
                btn.textContent = "送信";
            }
        };

        // 新規投稿処理
        if (postForm) {
            postForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!db || firebaseConfig.apiKey === "YOUR_API_KEY") {
                    alert("Firebaseの設定が完了していません。投稿機能は無効になっています。");
                    return;
                }

                const btn = postForm.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.textContent = "送信中...";

                const tag = document.getElementById('postTag').value;
                const title = document.getElementById('postTitle').value;
                const author = document.getElementById('postAuthor').value;
                const content = document.getElementById('postContent').value;
                const deletePassword = document.getElementById('postPassword') ? document.getElementById('postPassword').value : "";

                const now = new Date();
                const dateStr =
                    now.getFullYear() + '/' +
                    String(now.getMonth() + 1).padStart(2, '0') + '/' +
                    String(now.getDate()).padStart(2, '0') + ' ' +
                    String(now.getHours()).padStart(2, '0') + ':' +
                    String(now.getMinutes()).padStart(2, '0');

                try {
                    await addDoc(collection(db, "bbs_posts"), {
                        tag,
                        title,
                        author,
                        content,
                        deletePassword,
                        date: dateStr,
                        createdAt: Date.now(),
                        comments: []
                    });

                    postForm.reset();
                    if (postModal) postModal.classList.remove('show');
                    currentPage = 1;
                } catch (error) {
                    console.error("Error adding document: ", error);
                    alert("投稿に失敗しました。(設定をご確認ください)");
                } finally {
                    btn.disabled = false;
                    btn.textContent = "投稿する";
                }
            });
        }

        // --- 検索機能 ---
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        const performSearch = () => {
            if (!searchInput) return;
            const keyword = searchInput.value;
            currentPage = 1;
            loadPosts(keyword);
        };

        if (searchInput) {
            searchInput.addEventListener('input', performSearch);
        }
        if (searchBtn) {
            searchBtn.addEventListener('click', performSearch);
        }
    </script>
</body>

</html>
