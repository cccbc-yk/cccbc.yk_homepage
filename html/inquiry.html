    <script>
        // 本物のアクセス数を取得して更新
        async function updateRealAccessCount() {
            const el = document.getElementById('accessCount');
            const siteId = "cccbc-yk-homepage"; // サイト識別用ID

            try {
                // Visit-Counter API (無料のアクセスカウンター) を使用
                const response = await fetch(`https://api.visitorbadge.io/api/visitors?path=${siteId}&countOnly=true`);
                const text = await response.text();
                const count = parseInt(text) || 0;

                // 初期の10,841に加算して表示（キリ番っぽく見せるため）
                const baseCount = 0;
                el.textContent = (baseCount + count).toLocaleString();
            } catch (e) {
                console.error("Access count fetch failed:", e);
                // 失敗した場合は既存の表示を維持
            }
        }

        // 時刻・ステータスの更新
        function updateStats() {
            const now = new Date();
            document.getElementById('currentTime').textContent =
                now.getHours().toString().padStart(2, '0') + ':' +
                now.getMinutes().toString().padStart(2, '0') + ':' +
                now.getSeconds().toString().padStart(2, '0');

            // アンテナの演出: 基本4本、たまに3本
            const bar4 = document.getElementById('bar-4');
            if (bar4 && Math.random() > 0.95) {
                bar4.style.opacity = Math.random() > 0.3 ? "1" : "0.2";
            }
        }

        setInterval(updateStats, 1000);
        updateStats();
        updateRealAccessCount(); // ページ読み込み時に実行

        // Canvas要素が未使用の場合は非表示にする（あるいは削除）
        const headerCanvas = document.getElementById('headerCanvas');
        if (headerCanvas) headerCanvas.style.display = 'none';

        // 地球メニューの開閉
        const earthBtn = document.getElementById('header-earth-part');
        const menuPanel = document.getElementById('menuPanel');

        earthBtn.addEventListener('click', () => {
            menuPanel.classList.toggle('open');
            earthBtn.classList.toggle('active');
        });

        // パネルの外をクリックしたら閉じる（オプション）
        document.addEventListener('click', (e) => {
            if (!earthBtn.contains(e.target) && !menuPanel.contains(e.target)) {
                menuPanel.classList.remove('open');
                earthBtn.classList.remove('active');
            }
        });
    </script>
